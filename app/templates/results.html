<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Lead Pipeline Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <main>
      <h1>Lead Pipeline Results</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="flash-messages">
            {% for category, message in messages %}
              <p class="flash {{ category }}">{{ message }}</p>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% include "partials/_lead_queues.html" %}
      {% include "partials/_pipeline.html" %}
    </main>
  </body>
</html>
